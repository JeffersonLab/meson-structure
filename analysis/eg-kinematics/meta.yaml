# Per-energy EG kinematics analysis.
mode: per-energy

# Pure-Python (uproot/awkward/hist/matplotlib). No EIC stack needed.
use_container: false

# Map runner.py kwargs <- campaign.yaml keys
inputs:
  eg_dir: eg_dir

# Default sbatch resources (cheap, single-file analysis).
sbatch:
  time: "01:00:00"
  mem_gb: 4
  cpus_per_task: 1
