mode: per-energy

# multicalo reads ROOT/edm4eic via uproot — host Python with the right deps
# is fine. Flip to true if you need the EIC stack at some point.
use_container: false

inputs:
  inputs: eicrecon_dir
  # Event-generator files (flat dir, files named by energy) for the kaon-SF
  # cross-section normalisation in studies_kaon_sf.build_sigma_map_xb_q2.
  gen_dir: eg_dir

extra_params:
  nfiles: 1
  task: all

sbatch:
  time: "06:00:00"
  mem_gb: 8
