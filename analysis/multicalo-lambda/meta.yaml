mode: per-energy

# multicalo reads ROOT/edm4eic via uproot. Run inside the EIC-stack container so
# the science deps (uproot/awkward/matplotlib) are guaranteed present. The
# container runtime (singularity vs docker) is chosen by the campaign config.
use_container: true

inputs:
  inputs: eicrecon_dir
  # Event-generator files (flat dir, files named by energy) for the kaon-SF
  # cross-section normalisation in studies_kaon_sf.build_sigma_map_xb_q2.
  gen_dir: eg_dir

extra_params:
  nfiles: 1
  task: all

sbatch:
  time: "06:00:00"
  mem_gb: 8
